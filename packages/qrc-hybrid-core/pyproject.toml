[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omegaxiv-qrc-hybrid-core"
version = "0.1.0"
description = "Reusable parity, entanglement, and operator-attribution analytics for quantum reservoir studies"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  {name = "omegaXiv Packaging Pipeline"}
]
license = {text = "Proprietary"}
dependencies = [
  "numpy>=1.26",
  "pandas>=2.1",
  "scipy>=1.11"
]

[project.urls]
Homepage = "https://omegaxiv.org"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.mypy]
ignore_missing_imports = true
warn_return_any = false
